name: prosodia
description: "ProsodIA — App de evaluación de fluidez lectora para tablets Android"
publish_to: 'none'

version: 1.0.35+35

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Base de datos local (offline-first)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP
  dio: ^5.4.3+1

  # Audio
  record: ^5.1.1
  just_audio: ^0.9.38

  # OTA updates
  open_filex: ^4.7.0
  package_info_plus: ^8.0.0

  # Gráficas
  fl_chart: ^0.70.2

  # Utilidades
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/reading_covers/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/prosodia_logo.png
  min_sdk_android: 23
  adaptive_icon_background: '#18344A'
  adaptive_icon_foreground: assets/branding/prosodia_logo_foreground.png
  adaptive_icon_monochrome: assets/branding/prosodia_logo_monochrome.png
