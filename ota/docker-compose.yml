services:
  ota-server:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3020:80"
    volumes:
      - ./releases:/usr/share/nginx/html:ro
      - /root/apps/talkia/ota/releases:/talkia-releases:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true
